<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>404 - 江湖文化传媒</title>
	<link rel="stylesheet" href="style.css">
	<style>
		.error-page {
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			text-align: center;
			padding: 6rem 2rem;
			position: relative;
			z-index: 2;
		}

		.error-content {
			max-width: 800px;
			width: 100%;
			position: relative;
			z-index: 1;
		}

		.error-code {
			font-size: 12rem;
			font-weight: 900;
			line-height: 1;
			margin-bottom: 1rem;
			background: linear-gradient(135deg, var(--chinese-gold) 0%, var(--chinese-red) 50%, var(--neon-cyan) 100%);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
			animation: shimmerText 3s ease-in-out infinite;
			text-shadow: 0 0 60px rgba(212, 175, 55, 0.3);
		}

		.error-title {
			font-size: 2.5rem;
			font-weight: 700;
			margin-bottom: 1.5rem;
			color: var(--text-light);
			letter-spacing: 2px;
		}

		.error-description {
			font-size: 1.2rem;
			color: #c9c9c0;
			margin-bottom: 3rem;
			line-height: 1.8;
			letter-spacing: 1px;
		}

		.error-buttons {
			display: flex;
			gap: 1.5rem;
			justify-content: center;
			flex-wrap: wrap;
		}

		.btn-primary {
			display: inline-block;
			padding: 1rem 3rem;
			font-size: 1rem;
			font-weight: 600;
			text-decoration: none;
			color: var(--text-light);
			background: linear-gradient(135deg, var(--chinese-red), var(--chinese-gold));
			border: none;
			border-radius: 2px;
			cursor: pointer;
			transition: all 0.3s ease;
			letter-spacing: 1px;
		}

		.btn-primary:hover {
			transform: translateY(-3px);
			box-shadow: 0 10px 30px rgba(196, 30, 58, 0.4);
		}

		.btn-secondary {
			display: inline-block;
			padding: 1rem 3rem;
			font-size: 1rem;
			font-weight: 600;
			text-decoration: none;
			color: var(--chinese-gold);
			background: transparent;
			border: 2px solid var(--chinese-gold);
			border-radius: 2px;
			cursor: pointer;
			transition: all 0.3s ease;
			letter-spacing: 1px;
		}

		.btn-secondary:hover {
			background: var(--chinese-gold);
			color: var(--primary-dark);
			transform: translateY(-3px);
		}

		.error-decoration {
			display: flex;
			justify-content: center;
			align-items: center;
			gap: 30px;
			margin-bottom: 2rem;
		}

		.error-line {
			width: 100px;
			height: 1px;
			background: linear-gradient(90deg, transparent, var(--chinese-gold), transparent);
		}

		.error-dot {
			width: 12px;
			height: 12px;
			background: var(--chinese-gold);
			border-radius: 50%;
			box-shadow: 0 0 20px var(--chinese-gold);
			animation: pulse 2s ease-in-out infinite;
		}

		@keyframes pulse {
			0%, 100% {
				transform: scale(1);
				opacity: 1;
			}
			50% {
				transform: scale(1.3);
				opacity: 0.7;
			}
		}

		@media (max-width: 768px) {
			.error-page {
				padding: 4rem 1.5rem;
			}

			.error-code {
				font-size: 6rem;
			}

			.error-title {
				font-size: 1.8rem;
			}

			.error-description {
				font-size: 1rem;
			}

			.error-line {
				width: 60px;
			}

			.btn-primary,
			.btn-secondary {
				padding: 0.8rem 2rem;
				font-size: 0.9rem;
			}
		}
	</style>
</head>
<body>
	<!-- 装饰性背景 -->
	<div class="chinese-decoration">
		<div class="cloud-pattern cloud-1"></div>
		<div class="cloud-pattern cloud-2"></div>
		<div class="cloud-pattern cloud-3"></div>
	</div>

	<!-- 粒子背景 -->
	<canvas id="particles-canvas"></canvas>

	<!-- 导航栏 -->
	<nav>
		<div class="nav-container">
			<div class="logo">江湖<span>文化传媒</span></div>
			<button class="mobile-menu-btn" aria-label="Toggle menu">
				<span class="menu-icon"></span>
			</button>
			<div class="nav-links">
				<a href="index.html">首页</a>
				<a href="#services">服务</a>
				<a href="#portfolio">案例</a>
				<a href="#contact">联系我们</a>
			</div>
		</div>
	</nav>

	<!-- 404内容区域 -->
	<section class="error-page">
		<div class="error-content">
			<div class="error-decoration">
				<div class="error-line"></div>
				<div class="error-dot"></div>
				<div class="error-line"></div>
			</div>
			
			<h1 class="error-code">404</h1>
			<h2 class="error-title">页面未找到</h2>
			<p class="error-description">
				抱歉，您访问的页面可能已经移动、删除或从未存在。<br>
				让我们带您回到正确的地方继续探索。
			</p>
			
			<div class="error-buttons">
				<a href="index.html" class="btn-primary">返回首页</a>
				<a href="#contact" class="btn-secondary">联系我们</a>
			</div>
		</div>
	</section>

	<script src="script.js"></script>
</body>
</html>
